<!DOCTYPE html>
<html>
<head>
  <title>Simple Test</title>
</head>
<body>
  <h1>Photos</h1>
  <div id="output">Loading...</div>
  <script>
    fetch('/api/photos')
      .then(r => r.json())
      .then(data => {
        document.getElementById('output').innerHTML = 'Found ' + data.length + ' photos';
      })
      .catch(e => {
        document.getElementById('output').innerHTML = 'Error: ' + e.message;
      });
  </script>
</body>
</html>
